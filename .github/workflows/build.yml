name: build

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out mitiq
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          
      - name: Install the project
        run: uv sync --all-extras

      - name: Check types with mypy
        run: make check-types

      - name: Check code style/formatting
        run: make check-format


  # This is to make sure Mitiq works without optional 3rd party packages like Qiskit, pyQuil, etc.
  # E.g., if we accidentally `import qiskit` in Mitiq where we shouldn't, this test will catch that.
  core:
    runs-on: ubuntu-latest
    steps:
      - name: Check out mitiq
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Mitiq
        # Since requirements.txt includes cirq, which in turn has pyquil as dependency,
        # we explicitly remove pyquil from the installed packages after installing mitiq
        run: uv sync --no-dev

      - name: Test without 3rd party packages
        run: |
          uv run pip install pytest
          uv run pytest mitiq/tests/test_without_third_party_packages.py

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    env:
        MPLBACKEND: Agg
    steps:
      - name: Check out mitiq
        uses: actions/checkout@v6
        with:
          # Fetch full history so Codecov can resolve commit ancestry reliably.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python ${{ matrix.python-version }} and Python dependencies except for docs
        run: |
          uv python pin ${{ matrix.python-version }}
          uv python install
          uv sync --all-extras
          uv pip install setuptools>=61

      - name: Run the quilc & qvm Docker images
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          docker run --rm -idt -p 5000:5000 rigetti/qvm -S
          docker run --rm -idt -p 5555:5555 rigetti/quilc -R
          
      - name: Run all the unit tests
        run: ${{ matrix.os == 'ubuntu-latest' && 'make test-all' || 'make test' }}

      - name: Submit coverage report to Codecov
        # Upload once per workflow on same-repo PRs and on pushes to main so
        # PR comparisons always have a recent base report on the default branch.
        if: ${{ matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
