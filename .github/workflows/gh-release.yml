on:
  push:
    tags:
      - "v[0-9].[0-9]+.[0-9]+" # Push events to matching sematic versioning, i.e. v1.0, v20.15.10

permissions: {}

jobs:
  create_release:
    if: github.repository_owner == 'unitaryfoundation'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out Mitiq
        uses: actions/checkout@v6
      - name: Extract release notes of latest version
        run: |
          awk '/^## Version /{if(found) exit; found=1} found{print}' CHANGELOG.md > release_notes.md
      - name: Create Release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file ./release_notes.md \
            --draft
